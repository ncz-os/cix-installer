# preseed-ubuntu.cfg — nclawzero unattended Ubuntu install via bookworm d-i
#
# d-i provides the installer (busybox initrd, debootstrap, apt-setup) but
# writes Ubuntu noble (24.04 LTS) to disk — d-i's debootstrap reads
# /usr/share/debootstrap/scripts/noble and bootstraps Ubuntu directly into
# /target. The resulting system has ZERO Debian packages.
#
# Why bookworm-d-i: r17-r24 proved Ubuntu casper kernel-panics on Sky1
# UEFI USB boot. Bookworm-d-i busybox initrd works (r6 confirmed).
# Bootloader and ISO structure are bookworm's; userspace is Ubuntu's.

##############################################################################
# Localization
##############################################################################
d-i debian-installer/locale string en_US.UTF-8
d-i debian-installer/locale seen true
d-i debian-installer/language string en
d-i debian-installer/language seen true
d-i debian-installer/country string US
d-i debian-installer/country seen true
d-i keyboard-configuration/xkb-keymap select us
d-i keyboard-configuration/xkb-keymap seen true
d-i keyboard-configuration/layoutcode string us
d-i keyboard-configuration/layoutcode seen true

##############################################################################
# Network — DHCP, fully automatic, retry forever.
##############################################################################
d-i netcfg/choose_interface select auto
d-i netcfg/choose_interface seen true
# r64: default hostname "mini" (was d-i builtin "debian")
d-i netcfg/get_hostname string mini
d-i netcfg/get_hostname seen true
d-i netcfg/hostname string mini
d-i netcfg/hostname seen true
d-i netcfg/get_domain string nclawzero.lan
d-i netcfg/get_domain seen true
d-i netcfg/wireless_wep string

d-i netcfg/disable_autoconfig boolean false
d-i netcfg/disable_autoconfig seen true
d-i netcfg/link_wait_timeout string 60
d-i netcfg/link_wait_timeout seen true
d-i netcfg/link_detection_timeout string 60
d-i netcfg/link_detection_timeout seen true
d-i netcfg/dhcp_timeout string 120
d-i netcfg/dhcp_timeout seen true
d-i netcfg/dhcpv6_timeout string 120
d-i netcfg/dhcpv6_timeout seen true
d-i netcfg/dhcp_failed note
d-i netcfg/dhcp_options select Retry network autoconfiguration with a DHCP hostname
d-i netcfg/dhcp_options seen true

##############################################################################
# anna: skip the "No kernel modules were found" critical prompt.
##############################################################################
d-i anna/no_kernel_modules boolean true
d-i anna/no_kernel_modules seen true

##############################################################################
# Network-console — SSH for live remote diagnostics during install
##############################################################################
d-i anna/choose_modules string network-console
d-i anna/choose_modules seen true
d-i network-console/password password Gumbo@Kona1b
d-i network-console/password seen true
d-i network-console/password-again password Gumbo@Kona1b
d-i network-console/password-again seen true
d-i network-console/start select Continue
d-i network-console/start seen true

##############################################################################
# Mirror — OFFLINE, embedded on the ISO at /pool + /dists/questing
#
# r26: ISO embeds a curated questing arm64 mirror (~5-8 GB) at the root.
# d-i's cdebootstrap reads our generated Release file from /cdrom/dists/
# questing/Release — codename "questing" doesn't need to be hardcoded in
# cdebootstrap, it just trusts the Release file.
#
# Result: ZERO network dependency during install. Idiot-proof.
##############################################################################
d-i mirror/protocol string http
d-i mirror/protocol seen true
d-i mirror/country string manual
d-i mirror/country seen true
d-i mirror/http/hostname string ports.ubuntu.com
d-i mirror/http/hostname seen true
d-i mirror/http/directory string /ubuntu-ports
d-i mirror/http/directory seen true
d-i mirror/http/proxy string
d-i mirror/http/suite string questing
d-i mirror/http/suite seen true
d-i mirror/codename string questing
d-i mirror/codename seen true
d-i mirror/suite string questing
d-i mirror/suite seen true

# r31+ ARCHITECTURE: ONE suite (questing) for both regular debs AND udebs.
# build-iso-di.sh now drops dists/bookworm/ entirely and regenerates the
# udeb index at dists/questing/main/debian-installer/binary-arm64/Packages
# via dpkg-scanpackages on the actual pool contents (which includes
# bookworm udebs we kept + trixie udebs we grafted in).
# anna and cdebootstrap/debootstrap both read from dists/questing/.
d-i mirror/udeb/suite string questing
d-i mirror/udeb/suite seen true
d-i mirror/udeb/components multiselect main
d-i mirror/udeb/components seen true

# CRITICAL (codex r26 review): d-i base-installer in CD mode honors
# cdrom/suite + cdrom/codename, NOT mirror/codename, when picking which
# dists/<suite>/ to bootstrap from. Without these, cdebootstrap targets
# bookworm (the bookworm dists/ tree we kept for udebs) instead of
# questing.
d-i cdrom/suite string questing
d-i cdrom/suite seen true
d-i cdrom/codename string questing
d-i cdrom/codename seen true

# Allow unsigned Release (we don't GPG-sign the embedded mirror yet).
d-i debian-installer/allow_unauthenticated boolean true
d-i debian-installer/allow_unauthenticated seen true

# Tell cdebootstrap to use the cdrom-mounted local mirror first.
# d-i mounts the boot media at /cdrom; our /pool + /dists are at /cdrom/.
# This preseed makes apt-setup skip network and use cdrom only.
d-i apt-setup/use_mirror boolean false
d-i apt-setup/use_mirror seen true
d-i apt-setup/services-select multiselect
d-i apt-cdrom-setup/no-cd boolean false
d-i apt-cdrom-setup/no-cd seen true

##############################################################################
# Account setup — operator-prompted at install time.
##############################################################################
d-i passwd/root-login boolean false
d-i passwd/root-login seen true
d-i passwd/make-user boolean true
d-i passwd/make-user seen true
# username, fullname, password are PROMPTED (not preseeded)
d-i user-setup/allow-password-weak boolean true
d-i user-setup/allow-password-weak seen true
d-i user-setup/encrypt-home boolean false
d-i user-setup/encrypt-home seen true

##############################################################################
# Clock + time
##############################################################################
d-i clock-setup/utc boolean true
d-i clock-setup/utc seen true
d-i time/zone string America/New_York
d-i time/zone seen true
d-i clock-setup/ntp boolean true
d-i clock-setup/ntp seen true

##############################################################################
# Partitioning — guided, use entire disk, single ext4 root + small ESP
#
# r25 hit a red error screen during partman because /dev/nvme0n1 had an
# existing FAT16 ESP + ext4 root from prior r6 install. d-i's atomic
# recipe wants a clean disk; existing partitions with valid signatures
# trigger the "filesystem already present" warning.
#
# early_command wipes disk signatures (wipefs), GPT/MBR (sgdisk --zap-all),
# and the first 10MB of LBA before partman scans. Result: d-i sees a
# blank disk every time, no warnings, no operator intervention.
##############################################################################
d-i partman/early_command string \
    swapoff -a 2>/dev/null || true ; \
    for p in /dev/nvme0n1p* ; do umount "$p" 2>/dev/null || true ; done ; \
    for p in /dev/nvme0n1 /dev/nvme0n1p* ; do wipefs -a "$p" 2>/dev/null || true ; done ; \
    sgdisk --zap-all /dev/nvme0n1 2>/dev/null || true ; \
    dd if=/dev/zero of=/dev/nvme0n1 bs=1M count=200 conv=fdatasync 2>/dev/null || true ; \
    SZ=$(blockdev --getsz /dev/nvme0n1 2>/dev/null || echo 0) ; \
    [ "$SZ" -gt 4096 ] && dd if=/dev/zero of=/dev/nvme0n1 bs=512 seek=$((SZ - 4096)) count=4096 conv=fdatasync 2>/dev/null || true ; \
    sync ; \
    partprobe /dev/nvme0n1 2>/dev/null || true
d-i partman/early_command seen true

##############################################################################
# r40: partman/late_command — runs AFTER partman partitions+formats+mounts /target,
# BEFORE bootstrap-base. Extracts pre-built rootfs.tar.zst into /target so the
# stubbed bookworm /usr/sbin/debootstrap detects /target/etc/os-release and exits 0.
##############################################################################
d-i partman/late_command string sh /cdrom/cixmini/extract-rootfs.sh
d-i partman/late_command seen true

d-i partman-auto/disk string /dev/nvme0n1
d-i partman-auto/disk seen true
d-i partman-auto/method string regular
d-i partman-auto/method seen true
d-i partman-auto/choose_recipe select atomic
d-i partman-auto/choose_recipe seen true
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-lvm/device_remove_lvm seen true
d-i partman-md/device_remove_md boolean true
d-i partman-md/device_remove_md seen true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm seen true
d-i partman-lvm/confirm_nooverwrite boolean true
d-i partman-lvm/confirm_nooverwrite seen true
d-i partman/confirm_write_new_label boolean true
d-i partman/confirm_write_new_label seen true
d-i partman/choose_partition select finish
d-i partman/choose_partition seen true
d-i partman/confirm boolean true
d-i partman/confirm seen true
d-i partman/confirm_nooverwrite boolean true
d-i partman/confirm_nooverwrite seen true

##############################################################################
# Base system — debootstrap questing with the gutsy script
#
# Bookworm's debootstrap (1.0.128) doesn't have a "questing" script — that
# codename came out 2025-10. But ALL Ubuntu codenames since gutsy (2007)
# use the same debootstrap script (they're all symlinks to gutsy upstream).
# So we tell base-installer to use the gutsy script for our questing suite.
# Codex r26 review caught this — without the override, debootstrap fails
# with "No such script: questing".
##############################################################################
d-i base-installer/debootstrap_script string gutsy
d-i base-installer/debootstrap_script seen true

# Skip the d-i kernel image install — we provide our own via late_command.
d-i base-installer/kernel/image string none
d-i base-installer/kernel/image seen true

##############################################################################
# APT setup — offline mode. Mirror config above defines source = cdrom.
# After install, late.sh writes /etc/apt/sources.list pointing at
# ports.ubuntu.com so the new system can reach updates over network.
##############################################################################
d-i apt-setup/security_host string ports.ubuntu.com
d-i apt-setup/security_host seen true
d-i apt-setup/security_path string /ubuntu-ports
d-i apt-setup/security_path seen true

# Add Ubuntu universe + multiverse + restricted repos for the post-install
# /etc/apt/sources.list (apt-setup writes this even though install uses cdrom)
d-i apt-setup/restricted boolean true
d-i apt-setup/restricted seen true
d-i apt-setup/multiverse boolean true
d-i apt-setup/multiverse seen true
d-i apt-setup/universe boolean true
d-i apt-setup/universe seen true
d-i apt-setup/non-free-firmware boolean true
d-i apt-setup/non-free-firmware seen true
d-i apt-setup/non-free boolean true
d-i apt-setup/non-free seen true

##############################################################################
# Tasksel — skip Debian-specific tasks (would fail on Ubuntu suite anyway)
##############################################################################
d-i pkgsel/run_tasksel boolean false
d-i pkgsel/run_tasksel seen true
tasksel tasksel/first multiselect

# Minimal package set; full GNOME + nclawzero stack installed via late_command
d-i pkgsel/include string openssh-server ca-certificates curl gnupg lsb-release sudo
d-i pkgsel/include seen true
d-i pkgsel/upgrade select full-upgrade
d-i pkgsel/upgrade seen true
d-i pkgsel/update-policy select none
d-i pkgsel/update-policy seen true
d-i pkgsel/updatedb boolean false
d-i pkgsel/updatedb seen true

##############################################################################
# Bootloader — d-i installs GRUB to ESP. Our 70-bootloader.sh in late.sh
# replaces it with systemd-boot + our Sky1 kernel + working cmdline.
##############################################################################
# r45: skip grub-installer entirely. We use systemd-boot via post-install
# hook 70-bootloader.sh, so the target system does not need GRUB. d-i's
# grub-installer also tries to call grub-install with --force-extra-removable
# which the cloudimg rootfs grub does not support — skipping avoids both
# issues. preseed/late_command (our late.sh) runs anyway and our hook chain
# writes the proper systemd-boot loader entries.
d-i grub-installer/skip boolean true
d-i grub-installer/skip seen true
d-i nobootloader/confirmation_common boolean true
d-i nobootloader/confirmation_common seen true

# Legacy lines kept commented for reference if we ever flip back to GRUB:
# d-i grub-installer/only_debian boolean true
# d-i grub-installer/with_other_os boolean true
# d-i grub-installer/bootdev string default

##############################################################################
# Late command — invoke our cixmini bootstrapper.
##############################################################################
d-i preseed/late_command string \
    sh /cdrom/cixmini/late.sh
d-i preseed/late_command seen true

##############################################################################
# Finish
d-i finish-install/keep-consoles boolean true
d-i finish-install/keep-consoles seen true
##############################################################################
d-i debian-installer/exit/poweroff boolean false
d-i debian-installer/exit/poweroff seen true
d-i debian-installer/exit/reboot boolean true
d-i debian-installer/exit/reboot seen true
