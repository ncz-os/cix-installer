# preseed.cfg — nclawzero unattended install for Cix Sky1 / cixmini
#
# This is the canonical preseed for the cix-installer ISO. d-i reads this
# at boot (we patch the GRUB cmdline to point at it) and drives a fully
# unattended install through to nclawzero on the target's internal disk.
#
# Reference: https://www.debian.org/releases/stable/example-preseed.txt

##############################################################################
# Localization
##############################################################################
d-i debian-installer/locale string en_US.UTF-8
d-i debian-installer/language string en
d-i debian-installer/country string US
d-i keyboard-configuration/xkb-keymap select us
d-i keyboard-configuration/layoutcode string us

##############################################################################
# Network
##############################################################################
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string cixmini
d-i netcfg/get_domain string nclawzero.lan
d-i netcfg/wireless_wep string

# If autoconfig fails, fall back to manual prompting only as a last resort.
d-i netcfg/disable_autoconfig boolean false
d-i netcfg/dhcp_failed note
d-i netcfg/dhcp_options select Configure network manually

##############################################################################
# Mirror
##############################################################################
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

##############################################################################
# Account setup
#
# Root password and ncz operator are seeded with the fleet-default
# 'Gumbo@Kona1b'. Operators are expected to rotate post-install (cf.
# /etc/motd guidance). The hash below is `mkpasswd -m sha-512 'Gumbo@Kona1b'`
# with a fixed salt for build reproducibility. NOT a security boundary —
# treat as factory-default.
##############################################################################
d-i passwd/root-login boolean true
d-i passwd/root-password-crypted password $6$cixmini2026$Ek3ZY9PbE9CUI2hDX7DI6U5fk3JEfzGCzjbbgPaaX.nUZ70Gz6mufxWYeataJsXY22OAwppjCz6OTOxkS9CtW.

d-i passwd/user-fullname string nclawzero operator
d-i passwd/username string ncz
d-i passwd/user-password-crypted password $6$cixmini2026$Ek3ZY9PbE9CUI2hDX7DI6U5fk3JEfzGCzjbbgPaaX.nUZ70Gz6mufxWYeataJsXY22OAwppjCz6OTOxkS9CtW.
d-i passwd/user-default-groups string audio cdrom video plugdev netdev sudo dialout

##############################################################################
# Clock + time zone
##############################################################################
d-i clock-setup/utc boolean true
d-i time/zone string UTC
d-i clock-setup/ntp boolean true

##############################################################################
# Partitioning — GPT + 1 GiB ESP + rest ext4 root
#
# Dynamic disk detection: pick the first that exists in nvme0n1 (cixmini
# canonical), vda (QEMU virtio for build-pipeline testing), sda (USB or
# legacy SATA fallback). early_command runs before partman-auto reads the
# disk, so we can populate the debconf key from the live system view.
##############################################################################
d-i partman/early_command string \
    for d in /dev/nvme0n1 /dev/vda /dev/sda; do \
        if [ -b "$d" ]; then \
            debconf-set partman-auto/disk "$d"; \
            debconf-set grub-installer/bootdev "$d"; \
            echo "[preseed] target disk: $d"; \
            break; \
        fi; \
    done

d-i partman-auto/method string regular
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true

d-i partman-auto/expert_recipe string                         \
      cixmini ::                                              \
              1024 1024 1024 fat32                            \
                      $primary{ } $bootable{ }                \
                      method{ efi } format{ }                 \
              .                                               \
              4096 8192 -1 ext4                               \
                      $primary{ }                             \
                      method{ format } format{ }              \
                      use_filesystem{ } filesystem{ ext4 }    \
                      mountpoint{ / }                         \
              .

d-i partman-auto/choose_recipe select cixmini
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true
d-i partman-efi/non_efi_system boolean true

# We deliberately don't allocate swap (cixmini is a 64 GB-RAM edge agent
# device; pinning kept-resident matters more than swap). Suppress d-i's
# "no swap?" warning so install runs unattended.
d-i partman-basicfilesystems/no_swap boolean false

##############################################################################
# Base system + apt
##############################################################################
d-i base-installer/install-recommends boolean false
d-i base-installer/kernel/image string linux-image-arm64
d-i apt-setup/non-free-firmware boolean true
d-i apt-setup/non-free boolean true
d-i apt-setup/contrib boolean true
d-i apt-setup/services-select multiselect security, updates
d-i apt-setup/security_host string security.debian.org

##############################################################################
# Package selection — deliberately minimal at d-i time. Our post-install
# scripts pull in the rest (GNOME desktop, chromium, podman, etc.).
#
# Why so spare here: tasksel + pkgsel hits a "Select and install software /
# Installation step failed" if anything in the dep set is unavailable or
# the network has a hiccup mid-install. Easier to keep this lean and let
# our 20-desktop.sh / 30-agents.sh / etc. handle the heavy lifting once
# we're in the chroot with a stable apt config.
##############################################################################
# pkgsel/run_tasksel=false: skip tasksel entirely. Our post-install
# hooks install GNOME, chromium, agent stack, etc. directly via apt,
# bypassing tasksel's flakiness. Just give us a minimal Debian + the
# packages we need to run our hooks.
d-i pkgsel/run_tasksel boolean false
d-i pkgsel/include string sudo openssh-server ca-certificates curl wget \
                          systemd-boot systemd-boot-efi efibootmgr \
                          dosfstools parted lsb-release \
                          gnupg2 nano
d-i pkgsel/upgrade select none
d-i pkgsel/update-policy select none
d-i pkgsel/install-language-support boolean false

##############################################################################
# Bootloader — systemd-boot, NOT grub
#
# We skip grub-installer by setting it to no-install, then install
# systemd-boot via post-install hook (it has cleaner UEFI semantics for
# our use case + better preseed integration).
##############################################################################
d-i grub-installer/skip boolean true
d-i nobootloader/confirmation_common boolean true

##############################################################################
# Finishing up
##############################################################################
d-i finish-install/keep-consoles boolean true
d-i finish-install/reboot_in_progress note
d-i cdrom-detect/eject boolean true

##############################################################################
# Late commands — drop into the target rootfs and run our staged hooks.
#
# Hooks live at /cdrom/cixmini/post-install/ on the installer ISO and get
# copied into /target/usr/local/lib/cix-installer/ + executed in order.
# Each hook runs in chroot context against the freshly-installed system
# and is responsible for one layer of the nclawzero stack.
##############################################################################
d-i preseed/late_command string \
    cp -r /cdrom/cixmini /target/usr/local/lib/cix-installer ; \
    chmod 755 /target/usr/local/lib/cix-installer/post-install/*.sh ; \
    in-target /usr/local/lib/cix-installer/post-install/run-all.sh
