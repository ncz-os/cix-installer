# preseed.cfg — nclawzero unattended install for Cix Sky1 / cixmini
#
# This is the canonical preseed for the cix-installer ISO. d-i reads this
# at boot (we patch the GRUB cmdline to point at it) and drives a fully
# unattended install through to nclawzero on the target's internal disk.
#
# Reference: https://www.debian.org/releases/stable/example-preseed.txt

##############################################################################
# Localization
##############################################################################
d-i debian-installer/locale string en_US.UTF-8
d-i debian-installer/language string en
d-i debian-installer/country string US
d-i keyboard-configuration/xkb-keymap select us
d-i keyboard-configuration/layoutcode string us

##############################################################################
# Network — DHCP, fully automatic, retry forever.
##############################################################################
d-i netcfg/choose_interface select auto
# hostname intentionally NOT preseeded — operator picks at install time
d-i netcfg/get_domain string nclawzero.lan
d-i netcfg/wireless_wep string

d-i netcfg/disable_autoconfig boolean false
d-i netcfg/link_wait_timeout string 60
d-i netcfg/link_detection_timeout string 60
d-i netcfg/dhcp_timeout string 120
d-i netcfg/dhcpv6_timeout string 120
d-i netcfg/dhcp_failed note
d-i netcfg/dhcp_options select Retry network autoconfiguration with a DHCP hostname

##############################################################################
# anna: skip the "No kernel modules were found" critical prompt.
#
# Our installer ships our 6.6.10 Cix kernel + matching modules via the
# cpio appended to install.a64/initrd.gz at build time. The Debian CD
# pool only has nic-modules-6.1.0-42-arm64-di / kernel-image-6.1.0-42-
# arm64-di udebs (matched to the stock kernel d-i normally uses), so
# anna can't find a matching nic-modules-<our-KVER>-di udeb and asks
# whether to continue. Our modules are ALREADY available via the cpio
# injection + depmod-generated modules.alias, so udev autoloads NIC
# drivers without anna's help — we just need to tell anna to stop
# asking. (Source: di-initrd/var/lib/dpkg/info/anna.templates,
# Template: anna/no_kernel_modules, default false.)
##############################################################################
d-i anna/no_kernel_modules boolean true

##############################################################################
# Network-console — SSH server inside d-i for live remote diagnostics
#
# Boots the sshd inside the d-i runtime as soon as DHCP lands. Operators
# (and us, when triaging from another fleet host) can `ssh installer@<ip>`
# with the fleet-default password and watch the install through to
# completion, run lspci/dmesg/ip link if anything probes wrong, and abort
# or override if needed.
#
# `start select Continue` resumes auto-install once a session connects;
# without a session the auto-install proceeds normally — this is purely
# additive. The password is the fleet factory-default; rotate post-install.
##############################################################################
d-i anna/choose_modules string network-console
d-i network-console/password password Gumbo@Kona1b
d-i network-console/password-again password Gumbo@Kona1b
d-i network-console/start select Continue

##############################################################################
# Mirror
##############################################################################
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

##############################################################################
# Account setup — operator-prompted at install time.
#
# Only the default groups + root login policy are preseeded. Username,
# fullname, and both passwords are deliberately NOT preseeded so the
# d-i UI prompts the operator interactively. Three prompts total:
#   1. hostname (from netcfg above)
#   2. username + full name + password (combined panel)
#   3. root password (only if passwd/root-login=true)
##############################################################################
d-i passwd/root-login boolean true
d-i passwd/make-user boolean true
d-i passwd/user-default-groups string audio cdrom video plugdev netdev sudo dialout

##############################################################################
# Clock + time zone
##############################################################################
d-i clock-setup/utc boolean true
d-i time/zone string UTC
d-i clock-setup/ntp boolean true

##############################################################################
# Partitioning — GPT + 1 GiB ESP + rest ext4 root
#
# Dynamic disk detection — multi-disk-aware.
#
# Machines we expect to encounter (all CP8180-based unless noted):
#   Minisforum MS-R1   single NVMe (nvme0n1)            → auto-target
#   Framework Desktop  dual NVMe                        → operator prompt
#   Radxa Orion O6     dual NVMe                        → operator prompt
#   Orange Pi 6 Plus   single NVMe + microSD            → operator prompt
#   QEMU virtio        single vda                       → auto-target
#
# Strategy: enumerate non-removable block devices (NVMe + virtio + SATA),
# count them. If ONE disk is present, auto-target without prompts —
# unattended install on the canonical Minisforum or QEMU paths. If MORE
# THAN ONE, leave partman-auto/disk unset so d-i prompts the operator
# at the "Select disk to partition" panel — they pick which drive
# becomes the OS disk; the others stay untouched for post-install
# user-managed mounts (agent data, cache, etc).
#
# `init_automatically_partition` pre-selects "use entire disk" so the
# operator only has to pick the disk, not also walk through guided/
# manual partitioning method selection.
##############################################################################
d-i partman/early_command string \
    DISKS=""; \
    for cand in /dev/nvme0n1 /dev/nvme1n1 /dev/nvme2n1 /dev/nvme3n1 /dev/vda /dev/sda /dev/sdb; do \
        [ -b "$cand" ] && DISKS="$DISKS $cand"; \
    done; \
    NDISK=$(echo "$DISKS" | wc -w); \
    echo "[preseed] disks detected: $DISKS  (count: $NDISK)"; \
    if [ "$NDISK" = "1" ]; then \
        D=$(echo "$DISKS" | tr -d ' '); \
        debconf-set partman-auto/disk "$D"; \
        debconf-set grub-installer/bootdev "$D"; \
        echo "[preseed] single-disk auto-target: $D"; \
    else \
        echo "[preseed] $NDISK disks; operator picks at partman prompt"; \
    fi

d-i partman-auto/init_automatically_partition select Guided - use entire disk

d-i partman-auto/method string regular
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true

d-i partman-auto/expert_recipe string                         \
      cixmini ::                                              \
              1024 1024 1024 fat32                            \
                      $primary{ } $bootable{ }                \
                      method{ efi } format{ }                 \
              .                                               \
              4096 8192 -1 ext4                               \
                      $primary{ }                             \
                      method{ format } format{ }              \
                      use_filesystem{ } filesystem{ ext4 }    \
                      mountpoint{ / }                         \
              .

d-i partman-auto/choose_recipe select cixmini
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true
d-i partman-efi/non_efi_system boolean true

# We deliberately don't allocate swap (cixmini is a 64 GB-RAM edge agent
# device; pinning kept-resident matters more than swap). Suppress d-i's
# "no swap?" warning so install runs unattended.
d-i partman-basicfilesystems/no_swap boolean false

##############################################################################
# Base system + apt
##############################################################################
d-i base-installer/install-recommends boolean false
d-i base-installer/kernel/image string linux-image-arm64
d-i apt-setup/non-free-firmware boolean true
d-i apt-setup/non-free boolean true
d-i apt-setup/contrib boolean true
d-i apt-setup/services-select multiselect security, updates
d-i apt-setup/security_host string security.debian.org

##############################################################################
# Package selection — deliberately minimal at d-i time. Our post-install
# scripts pull in the rest (GNOME desktop, chromium, podman, etc.).
#
# Why so spare here: tasksel + pkgsel hits a "Select and install software /
# Installation step failed" if anything in the dep set is unavailable or
# the network has a hiccup mid-install. Easier to keep this lean and let
# our 20-desktop.sh / 30-agents.sh / etc. handle the heavy lifting once
# we're in the chroot with a stable apt config.
##############################################################################
# pkgsel/run_tasksel=false: skip tasksel entirely. Our post-install
# hooks install GNOME, chromium, agent stack, etc. directly via apt,
# bypassing tasksel's flakiness. Just give us a minimal Debian + the
# packages we need to run our hooks.
#
# pkgsel/include MUST be a single line — debconf 'string' values don't
# honor backslash line-continuations. Earlier multi-line attempt failed
# pkgsel with "Installation step failed" because the parser got
# confused by the continuations.
d-i pkgsel/run_tasksel boolean false
# Path-A debug: drop pkgsel/include to empty. If pkgsel still fails,
# the bug is in pkgsel itself, not our package list. If pkgsel passes,
# we add packages back one-by-one to bisect the offender.
d-i pkgsel/include string
d-i pkgsel/upgrade select none
d-i pkgsel/update-policy select none
d-i pkgsel/install-language-support boolean false

# Disable popularity-contest (anonymous package-usage telemetry to
# popcon.debian.org). cixmini is an edge agent device that owners
# may operate behind segmentation/VLAN boundaries; default-out is
# correct posture. Operator can opt in later via:
#   sudo dpkg-reconfigure popularity-contest
d-i popularity-contest/participate boolean false

##############################################################################
# Bootloader — systemd-boot, NOT grub
#
# We skip grub-installer by setting it to no-install, then install
# systemd-boot via post-install hook (it has cleaner UEFI semantics for
# our use case + better preseed integration).
##############################################################################
d-i grub-installer/skip boolean true
d-i nobootloader/confirmation_common boolean true

##############################################################################
# Finishing up
##############################################################################
d-i finish-install/keep-consoles boolean true
d-i finish-install/reboot_in_progress note

# CRITICAL: keep /cdrom mounted through late_command. The default
# cdrom-detect/eject=true unmounts the install media right before
# late_command runs, which made our `cp -r /cdrom/cixmini ...` fail
# with "Failed to run preseeded command" in QEMU run 9. Set false so
# our late_command can copy the embedded asset bundle into /target.
d-i cdrom-detect/eject boolean false

##############################################################################
# Late commands — drop into the target rootfs and run our staged hooks.
#
# Hooks live at /cdrom/cixmini/post-install/ on the installer ISO and get
# copied into /target/usr/local/lib/cix-installer/ + executed in order.
# Each hook runs in chroot context against the freshly-installed system
# and is responsible for one layer of the nclawzero stack.
##############################################################################
d-i preseed/late_command string \
    mkdir -p /target/var/log; \
    { date -u; echo "--- mount ---"; mount; echo "--- /cdrom ---"; ls -la /cdrom 2>&1; echo "--- /hd-media ---"; ls -la /hd-media 2>&1; echo "--- /media ---"; ls -la /media 2>&1; echo "--- /target ---"; ls -la /target 2>&1; } > /target/var/log/cix-late-debug.log 2>&1; \
    if [ -f /cdrom/cixmini/late.sh ]; then sh /cdrom/cixmini/late.sh; exit $?; fi; \
    if [ -f /hd-media/cixmini/late.sh ]; then sh /hd-media/cixmini/late.sh; exit $?; fi; \
    echo "FATAL: late.sh not found at /cdrom/cixmini/late.sh or /hd-media/cixmini/late.sh — see /var/log/cix-late-debug.log for mount state" >> /target/var/log/cix-late-debug.log; \
    exit 1
